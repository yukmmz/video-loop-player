<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="LoopPlayer" />
<meta name="theme-color" content="#000000" />
<link rel="manifest" href="manifest.webmanifest" />
<!-- iOS "Add to Home Screen" uses apple-touch-icon (NOT the manifest icons) -->
<link rel="apple-touch-icon" sizes="180x180" href="icon-180.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<link rel="icon" type="image/png" href="icon-192.png" />
<title>Video Loop Player</title>
<style>
  :root { --bg:#0b0b0d; --panel:#16161a; --fg:#f2f2f4; --muted:#9a9aa2;
          --accent:#3da9fc; --accent2:#2b6cb0; --line:#2a2a30; }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; height:100%; background:var(--bg); color:var(--fg);
              font-family:-apple-system,BlinkMacSystemFont,"Helvetica Neue",sans-serif; }
  body { display:flex; flex-direction:column; overflow:hidden; }
  header { display:flex; align-items:center; gap:12px; padding:10px 14px;
           border-bottom:1px solid var(--line); }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header .title { color:var(--muted); font-size:13px;
                  overflow:hidden; text-overflow:ellipsis; white-space:nowrap; flex:1; }
  .stage { flex:1; display:flex; align-items:center; justify-content:center;
           background:#000; min-height:0; position:relative; }
  video { max-width:100%; max-height:100%; background:#000; }
  .controls { padding:10px 14px; border-top:1px solid var(--line);
              display:flex; flex-direction:column; gap:10px; }
  .row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  button { background:var(--panel); color:var(--fg); border:1px solid var(--line);
           border-radius:10px; padding:12px 16px; font-size:15px; cursor:pointer;
           min-width:48px; min-height:48px; }
  button:active { background:#23232a; }
  button.primary { background:var(--accent2); border-color:var(--accent); }
  button.toggle.on { background:var(--accent2); border-color:var(--accent); }
  button.ghost { background:transparent; }
  label.file { background:var(--accent2); border:1px solid var(--accent);
               border-radius:10px; padding:12px 16px; font-size:15px; cursor:pointer;
               display:inline-flex; align-items:center; min-height:48px; }
  label.file input { display:none; }
  .speed { display:flex; align-items:center; gap:10px; flex:1; min-width:240px; }
  .speed input[type=range] { flex:1; }
  .speedval { font-variant-numeric:tabular-nums; width:56px; text-align:right; }
  .fps { display:flex; align-items:center; gap:6px; color:var(--muted); font-size:13px; }
  .fps input { width:60px; background:var(--panel); color:var(--fg);
               border:1px solid var(--line); border-radius:8px; padding:8px; font-size:14px; }
  .playlist { display:flex; gap:8px; overflow-x:auto; padding:4px 0; }
  .item { flex:0 0 auto; background:var(--panel); border:1px solid var(--line);
          border-radius:10px; padding:10px 12px; font-size:13px; max-width:180px;
          overflow:hidden; text-overflow:ellipsis; white-space:nowrap; cursor:pointer; }
  .item.active { border-color:var(--accent); box-shadow:0 0 0 1px var(--accent) inset; }
  .item.focus { background:var(--accent2); }
  .hint { color:var(--muted); font-size:12px; line-height:1.4; }
  .empty { color:var(--muted); text-align:center; padding:24px; }

  /* collapsed: hide the whole controls panel, keep header (with expand button) */
  body.collapsed .controls { display:none; }

  /* fullscreen mode: video fills the viewport, header+controls hidden */
  body.fs header, body.fs .controls { display:none; }
  body.fs .stage { position:fixed; inset:0; z-index:50; }
  /* filename label in a corner (shown in fullscreen) */
  #fsname { position:fixed; right:14px; bottom:12px; z-index:60; display:none;
            max-width:70vw; padding:6px 10px; border-radius:8px;
            background:rgba(0,0,0,0.45); color:#e8e8ec; font-size:13px;
            overflow:hidden; text-overflow:ellipsis; white-space:nowrap;
            pointer-events:none; }
  body.fs #fsname { display:block; }
  /* subtle exit button (shown in fullscreen) */
  #fsexit { position:fixed; top:12px; right:12px; z-index:60; display:none;
            background:rgba(0,0,0,0.45); border-color:rgba(255,255,255,0.25); }
  body.fs #fsexit { display:flex; }
</style>
</head>
<body>
<header>
  <h1>Video Loop Player</h1>
  <span class="title" id="title">no video</span>
  <button id="collapse" class="ghost" title="操作パネルを畳む/出す">▾ 操作</button>
</header>

<div class="stage">
  <video id="video" playsinline webkit-playsinline muted></video>
</div>

<!-- fullscreen overlays -->
<div id="fsname"></div>
<button id="fsexit" title="全画面を終了">⤓ 全画面終了</button>

<div class="controls">
  <div class="row">
    <label class="file">
      動画を選ぶ（複数可）
      <input id="file" type="file" accept="video/*" multiple />
    </label>
    <button id="playpause" class="primary">▶ 再生</button>
    <button id="prev" title="前のコマ">⏮ コマ</button>
    <button id="next" title="次のコマ">コマ ⏭</button>
    <button id="fs">⛶ 全画面</button>
    <button id="restartLoop" class="toggle">連続ループに戻る</button>
    <button id="mute" class="toggle on">🔇 ミュート</button>
  </div>

  <div class="row">
    <div class="speed">
      <span>速度</span>
      <input id="speed" type="range" min="0.1" max="5" step="0.1" value="1" />
      <span class="speedval" id="speedval">1.0x</span>
    </div>
    <button class="spd" data-v="0.25">0.25x</button>
    <button class="spd" data-v="0.5">0.5x</button>
    <button class="spd" data-v="1">1x</button>
    <button class="spd" data-v="2">2x</button>
    <div class="fps">fps <input id="fps" type="number" min="1" max="1000" step="1" value="30" /> <span>（コマ送り用）</span></div>
  </div>

  <div class="playlist" id="playlist">
    <div class="empty">「動画を選ぶ」から1本以上選択してください</div>
  </div>

  <div class="hint" id="hint">
    タップで「その動画だけ繰り返し」。「連続ループに戻る」で 1→2→…→N→1 の順再生に復帰。
    全画面中は右上「全画面終了」で戻れます。
    ※ iPadのSafariは再生速度の極端な値（特に2倍超・極端な低速）を無視することがあります（コマ送りで代替可）。
  </div>
</div>

<script>
(() => {
  const $ = (id) => document.getElementById(id);
  const video = $('video');
  const fileInput = $('file');
  const playpause = $('playpause');
  const prevBtn = $('prev');
  const nextBtn = $('next');
  const fsBtn = $('fs');
  const fsExit = $('fsexit');
  const fsName = $('fsname');
  const collapseBtn = $('collapse');
  const restartLoop = $('restartLoop');
  const muteBtn = $('mute');
  const speed = $('speed');
  const speedval = $('speedval');
  const fpsInput = $('fps');
  const playlistEl = $('playlist');
  const titleEl = $('title');

  let playlist = [];     // [{name, url}]
  let current = 0;       // index currently loaded
  let focusIndex = null; // when set, repeat just that video

  function revokeAll() { for (const it of playlist) URL.revokeObjectURL(it.url); }

  function renderPlaylist() {
    playlistEl.innerHTML = '';
    if (playlist.length === 0) {
      playlistEl.innerHTML = '<div class="empty">「動画を選ぶ」から1本以上選択してください</div>';
      return;
    }
    playlist.forEach((it, i) => {
      const div = document.createElement('div');
      div.className = 'item' + (i === current ? ' active' : '')
                    + (i === focusIndex ? ' focus' : '');
      div.textContent = (i + 1) + '. ' + it.name;
      div.title = it.name;
      div.addEventListener('click', () => focusOn(i));
      playlistEl.appendChild(div);
    });
  }

  function loadVideo(i, autoplay = true) {
    current = i;
    video.src = playlist[i].url;
    const label = (i + 1) + '/' + playlist.length + '  ' + playlist[i].name;
    titleEl.textContent = label;
    fsName.textContent = label;
    video.load();
    video.playbackRate = parseFloat(speed.value);
    renderPlaylist();
    if (autoplay) play();
  }

  function play() { video.play().then(updatePP).catch(() => updatePP()); }
  function updatePP() { playpause.textContent = video.paused ? '▶ 再生' : '⏸ 停止'; }
  function nextInLoop() { return (current + 1) % playlist.length; }
  function focusOn(i) { focusIndex = i; loadVideo(i, true); }

  fileInput.addEventListener('change', (e) => {
    const files = [...e.target.files].filter(f =>
      f.type.startsWith('video/') || /\.(mp4|mov|m4v|webm)$/i.test(f.name));
    if (files.length === 0) return;
    revokeAll();
    playlist = files.map(f => ({ name: f.name, url: URL.createObjectURL(f) }));
    focusIndex = null; current = 0;
    loadVideo(0, true);  // inside a user gesture -> autoplay allowed
  });

  video.addEventListener('ended', () => {
    if (playlist.length === 0) return;
    if (focusIndex !== null) { video.currentTime = 0; play(); }
    else { loadVideo(nextInLoop(), true); }
  });
  video.addEventListener('play', updatePP);
  video.addEventListener('pause', updatePP);

  playpause.addEventListener('click', () => {
    if (playlist.length === 0) return;
    if (video.paused) play(); else video.pause();
  });

  function stepFrame(dir) {
    if (playlist.length === 0) return;
    video.pause();
    const fps = Math.max(1, parseFloat(fpsInput.value) || 30);
    let t = video.currentTime + dir / fps;
    if (t < 0) t = 0;
    if (isFinite(video.duration)) t = Math.min(t, video.duration - 1e-4);
    video.currentTime = t;
  }
  prevBtn.addEventListener('click', () => stepFrame(-1));
  nextBtn.addEventListener('click', () => stepFrame(+1));

  restartLoop.addEventListener('click', () => {
    if (playlist.length === 0) return;
    focusIndex = null; renderPlaylist();
    if (video.paused) play();
  });

  muteBtn.addEventListener('click', () => {
    video.muted = !video.muted;
    muteBtn.classList.toggle('on', video.muted);
    muteBtn.textContent = video.muted ? '🔇 ミュート' : '🔊 音あり';
  });

  function setSpeed(v) {
    v = Math.min(5, Math.max(0.1, v));
    speed.value = v; speedval.textContent = v.toFixed(1) + 'x';
    video.playbackRate = v;
  }
  speed.addEventListener('input', () => setSpeed(parseFloat(speed.value)));
  document.querySelectorAll('.spd').forEach(b =>
    b.addEventListener('click', () => setSpeed(parseFloat(b.dataset.v))));

  // collapse / expand the controls panel
  collapseBtn.addEventListener('click', () => {
    const on = document.body.classList.toggle('collapsed');
    collapseBtn.textContent = on ? '▴ 操作' : '▾ 操作';
  });

  // fullscreen mode: CSS full-bleed + (where supported) the Fullscreen API
  function enterFs() {
    document.body.classList.add('fs');
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen;
    if (req) { try { req.call(el); } catch (e) {} }
  }
  function exitFs() {
    document.body.classList.remove('fs');
    const ex = document.exitFullscreen || document.webkitExitFullscreen;
    if (ex && (document.fullscreenElement || document.webkitFullscreenElement)) {
      try { ex.call(document); } catch (e) {}
    }
  }
  fsBtn.addEventListener('click', enterFs);
  fsExit.addEventListener('click', exitFs);
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) document.body.classList.remove('fs');
  });

  // keyboard (desktop testing)
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.code === 'Space') { e.preventDefault(); playpause.click(); }
    else if (e.code === 'ArrowLeft') stepFrame(-1);
    else if (e.code === 'ArrowRight') stepFrame(+1);
    else if (e.code === 'Escape') exitFs();
    else if (e.key === 'f') enterFs();
  });

  // register service worker for offline use (ignored when opened via file://)
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
</body>
</html>
